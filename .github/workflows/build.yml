name: Build Windows Program

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 获取仓库代码
      uses: actions/checkout@v4

    - name: 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装 PyInstaller 打包工具
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: 开始打包为程序文件夹 (去除了 --onefile)
      run: |
        pyinstaller --noconsole --icon=NONE local_extractor.py

    - name: 上传打包好的成品供下载
      uses: actions/upload-artifact@v4
      with:
        name: Extractor-Program-Folder
        path: dist/local_extractor/
