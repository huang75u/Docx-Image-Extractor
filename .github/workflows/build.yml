name: Build Windows EXE

# 当你手动点击运行，或者代码有更新时触发
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    # 核心：指定这是一台最新的 Windows 云服务器
    runs-on: windows-latest

    steps:
    - name: 获取仓库代码
      uses: actions/checkout@v4

    - name: 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装 PyInstaller 打包工具
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: 开始打包为 EXE (添加了 --noconsole 隐藏黑框)
      run: |
        pyinstaller --onefile --noconsole --icon=NONE local_extractor.py

    - name: 上传打包好的成品供下载
      uses: actions/upload-artifact@v4
      with:
        name: Extractor-Program
        path: dist/local_extractor.exe
